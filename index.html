<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>歴史探索マップ</title>
    <link rel="manifest" href="manifest.json">    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="controls">
        <p style="margin: 0 0 8px 0; font-weight: bold;">古地図の切り替え:</p>
        <select id="old-map-select">
            <optgroup label="全国（国土地理院）">
                <option value="1945">1945-1950年</option>
                <option value="1961">1961-1969年</option>
                <option value="1974" selected>1974-1978年</option>
                <option value="1979">1979-1983年</option>
                <option value="1984">1984-1986年</option>
                <option value="1987">1987-1990年</option>
                <option value="2004">2004年～（簡易空中写真）</option>
                <option value="2015">2015年（年度別空中写真）</option>
            </optgroup>
        </select>

        <hr style="margin: 10px 0; border: none; border-top: 1px solid #ccc;">
        <label for="opacity-slider">古地図の透明度:</label><br>
        <input type="range" id="opacity-slider" min="0" max="1" step="0.1" value="0.7">

        <hr style="margin: 10px 0; border: none; border-top: 1px solid #ccc;">
        <button id="locate-btn">現在地を表示</button>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="main.js"></script>
</body>
</html>
