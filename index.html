<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>歴史探索マップ</title>
    <link rel="manifest" href="manifest.json">    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="controls">
        <p style="margin: 0 0 8px 0; font-weight: bold;">古地図の切り替え:</p>
        <label><input type="radio" name="old-map" value="1970s" checked> 1970年代</label>
        <label style="margin-left: 12px;"><input type="radio" name="old-map" value="meiji"> 明治時代</label>

        <hr style="margin: 10px 0; border: none; border-top: 1px solid #ccc;">
        <label for="opacity-slider">古地図の透明度:</label><br>
        <input type="range" id="opacity-slider" min="0" max="1" step="0.1" value="0.7">

        <hr style="margin: 10px 0; border: none; border-top: 1px solid #ccc;">
        <button id="locate-btn">現在地を表示</button>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="main.js"></script>
</body>
</html>
